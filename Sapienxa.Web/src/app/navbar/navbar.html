<header class="navbar" [class.scrolled]="isScrolled()" role="banner">
  <div class="container navbar__inner">
    <a href="#inicio" class="navbar__logo" aria-label="Sapienxa - Ir al inicio">
      <img
        [src]="isScrolled() ? '/logo_azul.png' : '/logo_blanco.png'"
        alt="Sapienxa"
        class="navbar__logo-img"
      >
    </a>

    <nav aria-label="Navegación principal" class="navbar__nav">
      @for (link of navLinks; track link.label) {
        <a [href]="link.href" class="nav-link">{{ link.label }}</a>
      }
    </nav>

    <div class="navbar__actions">
      <a href="#contacto" class="btn-primary navbar__cta">Agendar Demo</a>
      <button
        class="hamburger"
        [class.open]="isMenuOpen()"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Abrir menú de navegación"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile overlay -->
<div
  class="drawer-overlay"
  [class.visible]="isMenuOpen()"
  (click)="closeMenu()"
  aria-hidden="true"
></div>

<!-- Mobile drawer -->
<nav
  class="drawer"
  [class.open]="isMenuOpen()"
  aria-label="Menú móvil"
  [attr.aria-hidden]="!isMenuOpen()"
>
  <div class="drawer__header">
    <img src="/logo_blanco.png" alt="Sapienxa" class="navbar__logo-img navbar__logo-img--drawer">
    <button class="drawer__close" (click)="closeMenu()" aria-label="Cerrar menú">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M4 4l12 12M16 4L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="drawer__links">
    @for (link of navLinks; track link.label) {
      <a [href]="link.href" class="drawer-link" (click)="closeMenu()">{{ link.label }}</a>
    }
    <a href="#contacto" class="btn-primary drawer-cta" (click)="closeMenu()">Agendar Demo</a>
  </div>
</nav>
